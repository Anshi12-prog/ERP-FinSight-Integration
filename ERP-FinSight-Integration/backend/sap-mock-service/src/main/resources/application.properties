# =========================
# Database Configuration
# =========================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_finsight}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:anshika}
spring.datasource.password=postgres123${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA Configuration
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# Actuator
# =========================

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# =========================
# Application Information
# =========================

info.app.name=ERP FinSight Integration
info.app.version=1.0
info.app.description=Mock SAP ERP Integration Service
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

management.prometheus.metrics.export.enabled=true

management.endpoint.prometheus.enabled=true