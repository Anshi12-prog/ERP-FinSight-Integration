services:

  postgres:
    image: postgres:15
    container_name: erp-postgres
    restart: always

    environment:
      POSTGRES_DB: erp_finsight
      POSTGRES_USER: anshika
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend/sap-mock-service

    container_name: erp-backend

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/erp_finsight
      SPRING_DATASOURCE_USERNAME: anshika
      SPRING_DATASOURCE_PASSWORD: postgres123

  prometheus:
    image: prom/prometheus

    container_name: erp-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - backend

  grafana:
    image: grafana/grafana

    container_name: erp-grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

volumes:
  postgres_data: